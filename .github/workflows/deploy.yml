name: Deploy

on:
  workflow_dispatch:
    inputs:
      image:
        description: Docker image to deploy
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY || vars.DEPLOY_SSH_KEY }}
          VAULT_ADMIN_TOKEN: ${{ secrets.VAULT_ADMIN_TOKEN || vars.VAULT_ADMIN_TOKEN }}
        run: |
          set -eu
          test -n "$DEPLOY_HOST" || { echo "Missing repository secret: DEPLOY_HOST"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing repository secret: DEPLOY_USER"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing repository secret: DEPLOY_SSH_KEY"; exit 1; }
          test -n "$VAULT_ADMIN_TOKEN" || { echo "Missing repository secret: VAULT_ADMIN_TOKEN"; exit 1; }

      - name: Deploy container
        uses: appleboy/ssh-action@v1.0.3
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          DEFAULT_IMAGE: ghcr.io/${{ github.repository }}:main
          VAULT_ADMIN_TOKEN: ${{ secrets.VAULT_ADMIN_TOKEN || vars.VAULT_ADMIN_TOKEN }}
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY || vars.DEPLOY_SSH_KEY }}
          envs: INPUT_IMAGE,DEFAULT_IMAGE,VAULT_ADMIN_TOKEN
          script: |
            set -eu
            VAULT_IMAGE="${INPUT_IMAGE:-$DEFAULT_IMAGE}"
            export VAULT_IMAGE VAULT_ADMIN_TOKEN
            mkdir -p ~/secret-vault/data
            cd ~/secret-vault
            cat > docker-compose.yml <<'COMPOSE'
            services:
              vault:
                image: ${VAULT_IMAGE}
                restart: unless-stopped
                environment:
                  VAULT_ADMIN_TOKEN: ${VAULT_ADMIN_TOKEN}
                  DATABASE_URL: sqlite:///./data/vault.db
                  VAULT_UNSEAL_MIN_PARTS: "3"
                  VAULT_DEFAULT_WRAP_TTL_SECONDS: "60"
                  VAULT_MAX_WRAP_TTL_SECONDS: "300"
                ports:
                  - "8000:8000"
                volumes:
                  - ./data:/app/data
            COMPOSE
            docker compose pull
            docker compose up -d
